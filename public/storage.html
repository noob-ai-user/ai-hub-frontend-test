<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hub Storage - Character Repository</title>
  <link rel="icon" href="/hub/favicon.ico" type="image/x-icon">
  <!-- Load marked for markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap');

    :root {
      --bg-base: #06080d;
      --bg-surface: rgba(18, 22, 31, 0.85);
      --bg-panel: rgba(26, 32, 44, 0.6);
      --accent: #5e6ad2;
      --accent-glow: rgba(94, 106, 210, 0.5);
      --accent-hover: #7b86e8;
      --text: #f0f2f8;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --font: 'Inter', system-ui, sans-serif;
      --font-display: 'Outfit', system-ui, sans-serif;
    }
    
    * { box-sizing: border-box; }
    
    body {
      margin: 0; min-height: 100vh;
      font-family: var(--font);
      background-color: var(--bg-base);
      background-image: 
        radial-gradient(circle at 0% 0%, rgba(94, 106, 210, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(200, 80, 192, 0.1) 0%, transparent 50%);
      color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      padding: 0; overflow-x: hidden;
    }

    /* Navbar */
    .navbar {
      width: 100%; background: rgba(6, 8, 13, 0.8); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-content {
      max-width: 1400px; margin: 0 auto; padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo {
      font-family: var(--font-display); font-size: 1.5rem; font-weight: 900;
      background: linear-gradient(to right, #fff, #aeb6cc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none; display: flex; align-items: center; gap: 0.75rem;
    }
    .logo-icon { width: 32px; height: 32px; fill: url(#grad); }
    
    .nav-actions { display: flex; gap: 1rem; align-items: center; }
    .btn-back {
      color: var(--text-muted); text-decoration: none; font-weight: 600;
      padding: 0.5rem 1rem; border-radius: 8px; transition: all 0.2s;
      display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.05);
    }
    .btn-back:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* Main Container */
    main { width: min(1400px, 100%); padding: 2rem; flex: 1; }

    /* Header & Controls */
    .hero { margin-bottom: 3rem; text-align: center; }
    .hero h1 { font-family: var(--font-display); font-size: 3rem; font-weight: 900; margin: 0 0 0.5rem 0; }
    .hero p { color: var(--text-muted); font-size: 1.1rem; margin: 0; }

    .controls {
      display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap;
      background: var(--bg-surface); padding: 1rem; border-radius: 20px;
      border: 1px solid var(--border); backdrop-filter: blur(10px);
    }
    
    .search-wrapper { flex: 1; min-width: 280px; position: relative; }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .search-input {
      width: 100%; padding: 1rem 1rem 1rem 3rem; border-radius: 12px;
      border: 1px solid var(--border); background: rgba(0,0,0,0.3);
      color: var(--text); font-size: 1rem; transition: all 0.2s;
    }
    .search-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px var(--accent-glow); }
    
    .tabs { display: flex; gap: 0.5rem; background: rgba(0,0,0,0.3); padding: 0.5rem; border-radius: 12px; }
    .tab {
      padding: 0.6rem 1.5rem; border-radius: 8px; background: transparent;
      border: none; color: var(--text-muted); cursor: pointer;
      font-weight: 600; font-family: var(--font-display); font-size: 1rem;
      transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem;
    }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }

    /* Grid & Cards */
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;
    }
    
    .card {
      background: var(--bg-surface); border: 1px solid var(--border); border-radius: 24px;
      overflow: hidden; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative; aspect-ratio: 2/3; display: flex; flex-direction: column; justify-content: flex-end;
    }
    .card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.2); }
    .card::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.4) 40%, transparent 100%);
      z-index: 1;
    }
    
    .card-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; transition: transform 0.5s;
    }
    .card:hover .card-img { transform: scale(1.08); }
    
    .card-content {
      position: relative; z-index: 2; padding: 1.5rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .card-title {
      margin: 0; font-family: var(--font-display); font-size: 1.5rem; font-weight: 800;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8); line-height: 1.2;
    }
    .card-meta { display: flex; gap: 0.75rem; align-items: center; font-size: 0.85rem; color: #cbd5e1; }
    .badge {
      background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
      padding: 0.2rem 0.6rem; border-radius: 6px; font-weight: 600;
    }

    /* Modal Overlay (Chub Style) */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
      z-index: 1000; display: flex; justify-content: center; align-items: center;
      opacity: 0; visibility: hidden; transition: all 0.3s;
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    
    .modal-scroll-area {
      width: 100%; height: 100%; overflow-y: auto; display: flex; justify-content: center; padding: 2rem 0;
    }
    
    .modal {
      width: min(1000px, 90%); background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 24px; display: flex; overflow: hidden; transform: translateY(20px) scale(0.95);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 30px 60px rgba(0,0,0,0.6); position: relative; margin: auto;
    }
    .modal-overlay.active .modal { transform: translateY(0) scale(1); }
    
    .modal-close {
      position: absolute; top: 1.5rem; right: 1.5rem; width: 40px; height: 40px;
      border-radius: 50%; background: rgba(0,0,0,0.5); border: 1px solid var(--border);
      color: white; font-size: 1.2rem; cursor: pointer; z-index: 10;
      display: flex; justify-content: center; align-items: center; transition: all 0.2s;
    }
    .modal-close:hover { background: var(--accent); transform: rotate(90deg); }
    
    .modal-left { width: 40%; position: relative; background: #000; min-height: 400px; }
    .modal-img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    
    .modal-right { width: 60%; padding: 3rem; overflow-y: auto; max-height: 85vh; }
    
    .modal-header { margin-bottom: 2rem; }
    .modal-title { font-family: var(--font-display); font-size: 2.5rem; font-weight: 900; margin: 0 0 0.5rem 0; line-height: 1.1; }
    .modal-author { color: var(--accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.9rem; }
    
    .modal-actions { display: flex; gap: 1rem; margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .btn {
      padding: 0.8rem 1.5rem; border-radius: 12px; font-weight: 600; font-size: 0.95rem;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.5rem;
      border: none;
    }
    .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 20px var(--accent-glow); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { background: rgba(255,255,255,0.05); }
    
    .markdown-body { font-size: 1.05rem; line-height: 1.6; color: #d1d5db; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #fff; font-family: var(--font-display); margin-top: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    .markdown-body p { margin-bottom: 1rem; }
    .markdown-body pre { background: rgba(0,0,0,0.5); padding: 1rem; border-radius: 8px; border: 1px solid var(--border); overflow-x: auto; }
    .markdown-body code { background: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }
    .markdown-body blockquote { border-left: 4px solid var(--accent); margin: 0; padding-left: 1rem; color: var(--text-muted); font-style: italic; }
    
    /* Utility */
    .loader {
      border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent);
      border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 4rem auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: 30px; right: 30px; background: #22c55e; color: #fff;
      padding: 1rem 2rem; border-radius: 12px; font-weight: 600; font-family: var(--font);
      transform: translateY(100px); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 2000; box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3); display: flex; align-items: center; gap: 0.75rem;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: #ef4444; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3); }

    @media (max-width: 900px) {
      .modal { flex-direction: column; width: 100%; min-height: 100vh; border-radius: 0; transform: translateY(100%); }
      .modal-left { width: 100%; height: 50vh; min-height: auto; }
      .modal-right { width: 100%; padding: 2rem; }
      .modal-overlay.active .modal { transform: translateY(0); }
      .modal-close { background: rgba(0,0,0,0.7); }
    }
  </style>
</head>
<body>
  
  <nav class="navbar">
    <div class="nav-content">
      <a href="/hub" class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#fff" />
              <stop offset="100%" stop-color="#aeb6cc" />
            </linearGradient>
          </defs>
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        AI Hub
      </a>
      <div class="nav-actions">
        <a href="/hub" class="btn-back">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
          Back
        </a>
      </div>
    </div>
  </nav>

  <main>
    <div class="hero">
      <h1>Storage Repository</h1>
      <p>Browse your centralized collection of characters and lorebooks.</p>
    </div>

    <div class="controls">
      <div class="search-wrapper">
        <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" class="search-input" id="searchInput" placeholder="Search by name, creator, or tags..." oninput="filterItems()">
      </div>
      <div class="tabs">
        <button class="tab active" onclick="setTab('characters')" id="tab-characters">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          Characters (<span id="count-chars">0</span>)
        </button>
        <button class="tab" onclick="setTab('lorebooks')" id="tab-lorebooks">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
          Lorebooks (<span id="count-lore">0</span>)
        </button>
      </div>
    </div>

    <div id="loader" class="loader"></div>
    <div class="grid" id="grid"></div>
  </main>

  <div class="modal-overlay" id="charModal" onclick="if(event.target===this || event.target.className==='modal-scroll-area') closeModal()">
    <div class="modal-scroll-area">
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-left" id="modalLeft">
          <img id="modalImg" class="modal-img" src="" alt="">
        </div>
        <div class="modal-right">
          <div class="modal-header">
            <h2 class="modal-title" id="modalName">Name</h2>
            <div class="modal-author" id="modalCreator"></div>
          </div>
          
          <div class="modal-actions">
            <button class="btn btn-primary" onclick="exportLocal()">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
              Download
            </button>
            <button class="btn btn-outline" id="catboxBtn" onclick="exportCatbox()">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
              Catbox Link
            </button>
          </div>
          
          <div class="markdown-body" id="modalBody"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">
    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
    <span id="toastMsg">Action successful!</span>
  </div>

  <script>
    // Configure Marked.js to be safe and beautiful
    if (window.marked) {
      marked.setOptions({ breaks: true, gfm: true });
    }

    let storageData = { characters: [], lorebooks: [] };
    let parsedCache = {};
    let currentTab = 'characters';
    let selectedItem = null;

    // Smart Parser: Handled by Backend now. Metadata is pre-populated in item.metadata
    async function openModal(item) {
      selectedItem = item;
      const modal = document.getElementById('charModal');
      const imgUrl = `/api/storage/download?path=${encodeURIComponent(item.path)}`;
      const fallbackImg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="%232a324a" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><path d="M14 2v6h6"/></svg>';
      
      const modalLeft = document.getElementById('modalLeft');
      const displayImg = (!item.isJson && currentTab === 'characters') ? imgUrl : fallbackImg;
      document.getElementById('modalImg').src = displayImg;
      document.getElementById('modalImg').style.objectFit = (!item.isJson && currentTab === 'characters') ? 'cover' : 'contain';
      document.getElementById('modalImg').style.padding = (!item.isJson && currentTab === 'characters') ? '0' : '3rem';
      
      document.getElementById('modalName').textContent = item.displayName;
      document.getElementById('modalCreator').textContent = 'Loading metadata...';
      
      modal.classList.add('active');

      const data = item.metadata;
      const mdb = document.getElementById('modalBody');
      
      if (data) {
        // V2/V3 or V1 schema
        const spec = data.data || data; 
        
        let md = '';
        if (currentTab === 'characters') {
            document.getElementById('modalName').textContent = spec.name || item.displayName;
            document.getElementById('modalCreator').textContent = spec.creator ? `BY ${spec.creator}` : 'CHARACTER FILE';
            
            if (spec.description) md += `### Description\n${spec.description}\n\n`;
            if (spec.personality) md += `### Personality\n${spec.personality}\n\n`;
            if (spec.first_mes) md += `### First Message\n\n> ${spec.first_mes.replace(/\\n/g, '\n> ')}\n\n`;
            if (spec.mes_example) md += `### Example Messages\n\n\`\`\`text\n${spec.mes_example}\n\`\`\`\n\n`;
        } else {
            // Lorebooks schema
            document.getElementById('modalCreator').textContent = 'LOREBOOK FILE';
            const entries = spec.entries ? Object.values(spec.entries) : [];
            md += `*Loaded ${entries.length} entries.*\n\n`;
            
            entries.slice(0, 20).forEach(e => {
                let keys = e.keys || e.key || [];
                md += `### ${keys.join(', ') || 'Untitled Entry'}\n`;
                md += `${e.content}\n\n`;
            });
            if (entries.length > 20) {
                md += `*...and ${entries.length - 20} more entries. Download to view all.*`;
            }
        }
        
        mdb.innerHTML = window.marked ? marked.parse(md) : md;
      } else {
        document.getElementById('modalCreator').textContent = item.isJson ? 'JSON FILE' : 'RAW IMAGE';
        if (!item.isJson && currentTab === 'characters') {
           mdb.innerHTML = '<p>No internal metadata found. This is a raw image without embedded character data. It may rely on an external .json file.</p>';
        } else {
           mdb.innerHTML = '<p>Cannot display preview. Download to view file contents.</p>';
        }
      }
    }
    async function loadData() {
      try {
        const res = await fetch('/api/storage/list');
        storageData = await res.json();
        
        // Populate display names & formats
        for (const type of ['characters', 'lorebooks']) {
            storageData[type].forEach(item => {
                let name = item.name;
                name = name.replace(/\.(png|json)$/i, '').replace(/_/g, ' ');
                item.displayName = name;
                item.isJson = item.name.toLowerCase().endsWith('.json');
            });
        }
        
        document.getElementById('count-chars').textContent = storageData.characters.length;
        document.getElementById('count-lore').textContent = storageData.lorebooks.length;
        document.getElementById('loader').style.display = 'none';
        renderGrid();
      } catch (e) {
        showToast('Failed to load storage data', true);
      }
    }

    function setTab(tab) {
      currentTab = tab;
      document.getElementById('tab-characters').classList.toggle('active', tab === 'characters');
      document.getElementById('tab-lorebooks').classList.toggle('active', tab === 'lorebooks');
      renderGrid();
    }

    function filterItems() { renderGrid(); }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      const query = document.getElementById('searchInput').value.toLowerCase();
      const items = storageData[currentTab] || [];
      
      const filtered = items.filter(item => (item.displayName || item.name).toLowerCase().includes(query));
      
      if (filtered.length === 0) {
        grid.innerHTML = `<div style="color:var(--text-muted); text-align:center; grid-column: 1/-1; padding: 4rem; font-size:1.1rem;">No items found matching "${document.getElementById('searchInput').value}".</div>`;
        return;
      }

      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card';
        const imgUrl = `/api/storage/download?path=${encodeURIComponent(item.path)}`;
        const fallbackImg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="%233a4561" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><path d="M14 2v6h6"/><path d="m3 12.5 5 5"/><path d="m8 12.5-5 5"/></svg>';
        
        // Show fallback for JSON files, or actual image for PNGs
        const displayImg = (!item.isJson && currentTab === 'characters') ? imgUrl : fallbackImg;
        const objectFit = (!item.isJson && currentTab === 'characters') ? 'cover' : 'contain';
        const padding = (!item.isJson && currentTab === 'characters') ? '0' : '4rem';

        div.innerHTML = `
          <img class="card-img" src="${displayImg}" alt="${item.name}" onerror="this.src='${fallbackImg}'; this.style.objectFit='contain'; this.style.padding='4rem';" style="object-fit: ${objectFit}; padding: ${padding};">
          <div class="card-content">
            <div class="card-meta">
              <span class="badge">${item.isJson ? 'JSON' : 'PNG'}</span>
              <span>${(item.size / 1024).toFixed(1)} KB</span>
            </div>
            <h3 class="card-title">${item.displayName}</h3>
          </div>
        `;
        div.onclick = () => openModal(item);
        grid.appendChild(div);
      });
    }

    function closeModal() {
      document.getElementById('charModal').classList.remove('active');
    }

    function exportLocal() {
      if (!selectedItem) return;
      const link = document.createElement('a');
      link.href = `/api/storage/download?path=${encodeURIComponent(selectedItem.path)}`;
      link.download = selectedItem.name;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast(`Downloading ${selectedItem.name}...`);
    }

    async function exportCatbox() {
      if (!selectedItem) return;
      const btn = document.getElementById('catboxBtn');
      const originalHtml = btn.innerHTML;
      btn.innerHTML = '<div class="loader" style="width:20px;height:20px;margin:0;border-width:2px;display:inline-block;vertical-align:middle;"></div> Uploading...';
      btn.disabled = true;
      try {
        const res = await fetch(`/api/storage/catbox?path=${encodeURIComponent(selectedItem.path)}`, { method: 'POST' });
        const data = await res.json();
        if (data.url) {
          navigator.clipboard.writeText(data.url);
          showToast('Uploaded! Link copied to clipboard.');
        } else {
          showToast(data.error || 'Upload failed', true);
        }
      } catch (e) {
        showToast('Upload error: Connection failed', true);
      }
      btn.innerHTML = originalHtml;
      btn.disabled = false;
    }

    function showToast(msg, isError = false) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      
      const svgOk = '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>';
      const svgErr = '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
      
      toast.querySelector('svg').outerHTML = isError ? svgErr : svgOk;
      toast.className = 'toast ' + (isError ? 'error show' : 'show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    loadData();
  </script>
</body>
</html>
