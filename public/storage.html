<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Hub Library · Characters & Lorebooks</title>
  <link rel="icon" href="/hub/favicon.ico" type="image/x-icon">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap');
    :root{
      --bg:#070912;--bg2:#0b0f1d;--surface:#141a2c;--surface2:#1b2238;
      --primary:#7c5cff;--primary2:#c084fc;--accent:#22d3ee;--cat:#fb923c;
      --text:#f4f6fb;--muted:#9aa6c2;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.16);
      --fb:'Inter',system-ui,sans-serif;--fh:'Outfit',system-ui,sans-serif;
      --shadow:0 20px 50px -20px rgba(0,0,0,.7);--glow:0 0 0 1px rgba(124,92,255,.4),0 12px 40px -12px rgba(124,92,255,.5);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--fb);background:var(--bg);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(60vw 60vw at 15% -10%,rgba(124,92,255,.18),transparent 60%),radial-gradient(50vw 50vw at 100% 0%,rgba(34,211,238,.12),transparent 55%),radial-gradient(40vw 40vw at 50% 120%,rgba(192,132,252,.12),transparent 60%)}
    a{color:inherit;text-decoration:none}
    /* Navbar */
    .nav{position:sticky;top:0;z-index:50;background:rgba(7,9,18,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
    .brand{font-family:var(--fh);font-size:1.1rem;font-weight:800;display:flex;align-items:center;gap:.55rem;color:#fff;margin-right:auto}
    .brand .logo{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--primary2));box-shadow:0 8px 20px -6px rgba(124,92,255,.7);flex:none}
    .brand .logo svg{width:19px;height:19px;color:#fff}
    .brand small{display:block;font-family:var(--fb);font-weight:500;font-size:.68rem;color:var(--muted)}
    .nav-actions{display:flex;gap:.45rem;align-items:center;flex-wrap:wrap}
    .nbtn{font-size:.82rem;font-weight:600;color:var(--muted);padding:.5rem .8rem;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;transition:.2s;white-space:nowrap}
    .nbtn:hover{background:rgba(255,255,255,.1);color:#fff;border-color:var(--border2)}
    .nbtn svg{width:15px;height:15px}
    .nbtn.upload{position:relative;overflow:hidden}
    .nbtn.upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .nbtn:disabled{opacity:.5;cursor:not-allowed}
    .wrap{max-width:1500px;margin:0 auto;padding:1.5rem 1rem 5rem}
    /* Hero */
    .hero{text-align:center;margin:1rem 0 1.5rem}
    .hero h1{font-family:var(--fh);font-weight:900;line-height:1.05;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:-1px;background:linear-gradient(120deg,#fff 30%,var(--primary2) 70%,var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
    .hero p{color:var(--muted);font-size:clamp(.95rem,2.4vw,1.1rem);margin-top:.5rem}
    /* Segmented primary tabs */
    .seg{display:flex;gap:.3rem;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:.35rem;width:fit-content;margin:0 auto 1.25rem}
    .seg button{padding:.6rem 1.4rem;border:none;background:transparent;color:var(--muted);font-weight:700;font-size:.92rem;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;gap:.45rem;transition:.2s}
    .seg button.on{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 8px 22px -10px rgba(124,92,255,.9)}
    /* Toolbar */
    .bar{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:1rem;align-items:center}
    .search{flex:1 1 240px;position:relative;min-width:0}
    .search input{width:100%;padding:.8rem .9rem .8rem 2.7rem;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:#fff;font-family:var(--fb);font-size:.95rem}
    .search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(124,92,255,.18)}
    .search .ic{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted);width:18px;height:18px}
    .sel{padding:.75rem .8rem;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:#fff;font-family:var(--fb);font-size:.9rem;cursor:pointer;max-width:48vw}
    .pill{padding:.55rem 1rem;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--muted);font-weight:600;font-size:.85rem;cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;transition:.2s}
    .pill.on{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;border-color:transparent}
    .pill:hover{color:#fff}
    .chk{display:inline-flex;align-items:center;gap:.4rem;color:var(--muted);font-weight:600;font-size:.85rem;cursor:pointer;padding:.55rem .7rem;border:1px solid var(--border);border-radius:10px}
    /* Tag panel */
    .tagpanel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:.85rem;margin-bottom:1rem}
    .tagpanel .row{display:flex;gap:.5rem;margin-bottom:.6rem;flex-wrap:wrap}
    .tagpanel input{flex:1 1 160px;padding:.55rem .7rem;border-radius:9px;background:rgba(0,0,0,.3);border:1px solid var(--border);color:#fff;font-family:var(--fb);font-size:.85rem}
    .tags{display:flex;flex-wrap:wrap;gap:.4rem;max-height:8.5rem;overflow:auto}
    .tag{font-size:.75rem;padding:.25rem .6rem;border-radius:999px;border:1px solid var(--border2);background:rgba(255,255,255,.05);color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;transition:.15s}
    .tag.inc{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.5);color:#86efac}
    .tag.exc{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.5);color:#fca5a5;text-decoration:line-through}
    .muted-note{color:var(--muted);font-size:.72rem;margin-top:.5rem}
    /* Grid + cards */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1.1rem}
    @media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr);gap:.7rem}}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .28s cubic-bezier(.2,.7,.3,1),box-shadow .28s,border-color .28s;display:flex;flex-direction:column;aspect-ratio:3/4.4;position:relative}
    .card:hover{transform:translateY(-5px);border-color:var(--border2);box-shadow:var(--glow)}
    .card::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(to top,rgba(5,7,14,.96) 4%,rgba(5,7,14,.45) 38%,transparent 68%)}
    .cimg{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;transition:transform .6s;background:var(--surface2)}
    .card.json .cimg{object-fit:contain;padding:2.4rem;opacity:.65}
    .card:hover .cimg{transform:scale(1.05)}
    .cc{position:relative;z-index:2;margin-top:auto;padding:.85rem;display:flex;flex-direction:column;gap:.4rem}
    .ct{font-family:var(--fh);font-size:1rem;font-weight:800;line-height:1.15;text-shadow:0 2px 6px rgba(0,0,0,.9);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .cm{display:flex;gap:.35rem;flex-wrap:wrap;font-size:.7rem;color:#d7dffb}
    .badge{background:rgba(255,255,255,.14);backdrop-filter:blur(4px);padding:.1rem .45rem;border-radius:6px;font-weight:600;display:inline-flex;align-items:center;gap:.2rem}
    .badge.star{background:rgba(250,204,21,.18);color:#fde68a}
    .kind{position:absolute;top:.6rem;left:.6rem;z-index:3;background:rgba(124,92,255,.85);color:#fff;text-transform:uppercase;letter-spacing:.5px;font-size:.6rem;padding:.12rem .45rem;border-radius:6px}
    .kind.lore{background:rgba(34,211,238,.85);color:#04222a}
    /* states */
    .empty{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--muted)}
    .empty svg{width:56px;height:56px;margin:0 auto 1rem;opacity:.5}
    .loadwrap{display:flex;justify-content:center;padding:4rem}
    .loader{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--primary2);border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .more{display:flex;justify-content:center;margin-top:1.75rem}
    /* modal */
    .back{position:fixed;inset:0;background:rgba(3,5,12,.78);backdrop-filter:blur(10px);z-index:100;display:flex;justify-content:center;align-items:center;padding:1.5rem;animation:fade .2s}
    @keyframes fade{from{opacity:0}to{opacity:1}}
    .modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:1000px;max-height:90vh;display:flex;overflow:hidden;box-shadow:var(--shadow);position:relative}
    .x{position:absolute;top:.8rem;right:.8rem;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.55);border:1px solid var(--border);color:#fff;font-size:1.05rem;cursor:pointer;z-index:20;display:grid;place-items:center;transition:.2s}
    .x:hover{background:var(--primary);transform:rotate(90deg)}
    .ml{width:42%;background:#000;position:relative;flex:none}
    .ml img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    .ml.json{display:grid;place-items:center}.ml.json img{position:static;width:45%;height:auto;object-fit:contain;opacity:.6}
    .mr{width:58%;padding:2rem;overflow-y:auto;background:var(--surface);display:flex;flex-direction:column;gap:1.1rem}
    .mt{font-family:var(--fh);font-size:clamp(1.5rem,4vw,2.1rem);font-weight:900;line-height:1.08;letter-spacing:-.5px}
    .ma{color:var(--primary2);font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:1.4px;margin-top:.3rem}
    .stats{display:flex;gap:.5rem;flex-wrap:wrap}
    .stat{display:inline-flex;align-items:center;gap:.3rem;font-size:.76rem;color:#cdd6ef;background:rgba(255,255,255,.05);border:1px solid var(--border);padding:.28rem .55rem;border-radius:8px}
    .mtags{display:flex;gap:.35rem;flex-wrap:wrap}
    .mtag{font-size:.7rem;color:var(--primary2);background:rgba(192,132,252,.1);border:1px solid rgba(192,132,252,.25);padding:.18rem .5rem;border-radius:999px}
    .acts{display:flex;gap:.6rem;flex-wrap:wrap;padding-bottom:1.1rem;border-bottom:1px solid var(--border)}
    .btn{padding:.75rem 1.1rem;border-radius:11px;font-weight:700;font-size:.88rem;cursor:pointer;display:inline-flex;align-items:center;gap:.45rem;transition:.2s;border:none;font-family:var(--fb)}
    .btn svg{width:17px;height:17px}
    .b1{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 10px 26px -12px rgba(124,92,255,.9)}
    .b1:hover{transform:translateY(-2px);filter:brightness(1.08)}
    .b2{background:rgba(255,255,255,.05);color:#fff;border:1px solid var(--border)}.b2:hover{background:rgba(255,255,255,.1)}
    .bd{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}.bd:hover{background:rgba(239,68,68,.22)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .md{color:#c7d0ea;font-size:.96rem}.md h3{color:#fff;font-family:var(--fh);margin:1.3rem 0 .5rem;font-size:1.02rem}.md p{margin-bottom:.8rem}
    .md pre{background:rgba(0,0,0,.45);padding:.9rem;border-radius:9px;overflow-x:auto;margin-bottom:.9rem;border:1px solid var(--border);white-space:pre-wrap}
    .md blockquote{border-left:3px solid var(--primary);margin:0 0 .9rem;padding-left:.9rem;font-style:italic;color:var(--muted)}
    .toast{position:fixed;bottom:20px;left:50%;transform:translate(-50%,120px);background:#16a34a;color:#fff;padding:.85rem 1.3rem;border-radius:13px;font-weight:600;display:flex;align-items:center;gap:.55rem;box-shadow:0 14px 30px rgba(0,0,0,.5);z-index:200;opacity:0;transition:.35s cubic-bezier(.175,.885,.32,1.275);max-width:92vw}
    .toast.show{transform:translate(-50%,0);opacity:1}.toast.err{background:#dc2626}
    @media(max-width:768px){
      .back{padding:0;align-items:flex-end}
      .modal{flex-direction:column;max-height:94vh;border-radius:20px 20px 0 0}
      .ml{width:100%;height:34vh}.ml.json{height:22vh}
      .mr{width:100%;padding:1.3rem}.acts .btn{flex:1 1 auto;justify-content:center}
      .card{aspect-ratio:3/4}
      .brand small{display:none}
    }
  </style>
</head>
<body>
<div id="app">
  <nav class="nav">
    <a href="/hub" class="brand"><span class="logo"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></span><span>AI Hub<small>Character Library</small></span></a>
    <div class="nav-actions">
      <button class="nbtn" @click="importFromLink" :disabled="uploading"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.8 10.2a4 4 0 00-5.6 0l-4 4a4 4 0 105.6 5.7l1.1-1.1m-.7-4.9a4 4 0 005.6 0l4-4a4 4 0 00-5.6-5.7l-1.1 1.1"/></svg>Link</button>
      <label class="nbtn upload"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v12m0-12l-4 4m4-4l4 4M4 18v1a1 1 0 001 1h14a1 1 0 001-1v-1"/></svg>Upload<input type="file" accept=".png,.webp,.json" multiple @change="handleUpload"></label>
      <a href="/hub" class="nbtn"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>Hub</a>
    </div>
  </nav>

  <main class="wrap">
    <div class="hero"><h1>Character Library</h1><p>Your synced collection — and millions more to discover.</p></div>

    <div class="seg">
      <button :class="{on:view==='library'}" @click="setView('library')">📚 Library</button>
      <button :class="{on:view==='discover'}" @click="setView('discover')">🌐 Discover</button>
    </div>

    <!-- LIBRARY -->
    <template v-if="view==='library'">
      <div class="bar">
        <div class="search"><svg class="ic" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input v-model="q" placeholder="Filter your library…"></div>
        <button class="pill" :class="{on:libTab==='characters'}" @click="libTab='characters'">👤 Characters ({{data.characters.length}})</button>
        <button class="pill" :class="{on:libTab==='lorebooks'}" @click="libTab='lorebooks'">📖 Lorebooks ({{data.lorebooks.length}})</button>
      </div>
      <div v-if="loading" class="loadwrap"><div class="loader"></div></div>
      <div v-else-if="libItems.length===0" class="empty"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/></svg><p>{{q?'Nothing matches.':'Nothing yet — import some from Discover!'}}</p></div>
      <div v-else class="grid">
        <div class="card" v-for="it in libItems" :key="it.path" :class="{json:it.isJson}" @click="openLocal(it)">
          <span class="kind" :class="{lore:it.isJson}">{{it.isJson?'Lore':'Card'}}</span>
          <img class="cimg" :src="localImg(it)" loading="lazy" @error="imgErr">
          <div class="cc"><div class="cm"><span class="badge">{{size(it.size)}}</span></div><div class="ct">{{it.display}}</div></div>
        </div>
      </div>
    </template>

    <!-- DISCOVER -->
    <template v-else>
      <div class="bar">
        <select class="sel" v-model="src" @change="onSrc">
          <option v-for="(p,k) in providers" :key="k" :value="k">{{p.icon}} {{p.name}}</option>
        </select>
        <div class="search"><svg class="ic" @click="run(true)" style="cursor:pointer" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><input v-model="q" :placeholder="'Search '+providers[src].name+'…'" @keyup.enter="run(true)" @search="run(true)" enterkeyhint="search"></div>
        <select class="sel" v-model="sort" @change="run(true)"><option v-for="o in providers[src].sorts" :key="o.v" :value="o.v">{{o.label}}</option></select>
        <button class="pill" v-if="!providers[src].noTags" :class="{on:showTags}" @click="showTags=!showTags">🏷️ Tags<span v-if="inc.length||exc.length"> ({{inc.length+exc.length}})</span></button>
        <label class="chk"><input type="checkbox" v-model="nsfw" @change="run(true)"> NSFW</label>
      </div>

      <div class="tagpanel" v-if="showTags">
        <div class="row">
          <input v-model="tagInput" placeholder="Type a tag + Enter (click chips: green=include, red=exclude)" @keyup.enter="addTag">
          <button class="pill" @click="clearTags" v-if="inc.length||exc.length">Clear</button>
          <button class="pill on" @click="run(true)">Apply</button>
        </div>
        <div class="tags">
          <span class="tag" v-for="t in tagChoices" :key="t" :class="{inc:inc.includes(t),exc:exc.includes(t)}" @click="cycleTag(t)">{{t}}</span>
        </div>
        <div class="muted-note">Tap once = include, twice = exclude, thrice = off. Type to add your own.</div>
      </div>

      <div v-if="searching && results.length===0" class="loadwrap"><div class="loader"></div></div>
      <div v-else-if="results.length===0" class="empty"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><p>No results. Try another search or fewer tags.</p></div>
      <template v-else>
        <div class="grid">
          <div class="card" v-for="c in results" :key="c.source+':'+c.id" @click="openOnline(c)">
            <span class="kind" :style="{background:providers[c.source].color}">{{providers[c.source].name}}</span>
            <img class="cimg" :src="c.avatarUrl" loading="lazy" @error="imgErr">
            <div class="cc"><div class="cm"><span class="badge star" v-if="c.stars!=null">★ {{num(c.stars)}}</span><span class="badge" v-if="c.tokens">{{num(c.tokens)}} tk</span></div><div class="ct">{{c.name}}</div></div>
          </div>
        </div>
        <div class="more" v-if="hasMore"><button class="btn b2" @click="run(false)" :disabled="searching"><span v-if="searching" class="loader" style="width:15px;height:15px;border-width:2px"></span>{{searching?'Loading…':'Load more'}}</button></div>
      </template>
    </template>
  </main>

  <!-- modal -->
  <div class="back" v-if="sel" @click.self="close">
    <div class="modal">
      <button class="x" @click="close">✕</button>
      <div class="ml" :class="{json:sel.isJson&&!sel.isOnline}"><img :src="modalImg" @error="imgErr"></div>
      <div class="mr">
        <div><div class="mt">{{sel.metaName||sel.display||sel.name}}</div><div class="ma">{{sel.metaCreator||(sel.isJson?'Lorebook':'Character')}}</div></div>
        <div class="stats" v-if="sel.isOnline"><span class="stat" v-if="sel.stars!=null">★ {{num(sel.stars)}}</span><span class="stat" v-if="sel.tokens">⛃ {{num(sel.tokens)}} tk</span><span class="stat">{{providers[sel.source].name}}</span></div>
        <div class="mtags" v-if="sel.isOnline&&sel.tags&&sel.tags.length"><span class="mtag" v-for="t in sel.tags.slice(0,14)" :key="t">{{t}}</span></div>
        <div class="acts">
          <template v-if="sel.isOnline">
            <button class="btn b1" @click="importOnline" :disabled="uploading"><span v-if="uploading" class="loader" style="width:16px;height:16px;border-width:2px"></span><svg v-else fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v12m0-12l-4 4m4-4l4 4M4 18v1a1 1 0 001 1h14a1 1 0 001-1v-1"/></svg>{{uploading?'Importing…':'Import to Hub'}}</button>
            <a class="btn b2" v-if="sel.externalUrl" :href="sel.externalUrl" target="_blank" rel="noopener"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5h5v5m0-5L10 14M5 7v12h12"/></svg>Source</a>
          </template>
          <template v-else>
            <button class="btn b1" @click="download"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 16V4m0 12l-4-4m4 4l4-4M4 18v1a1 1 0 001 1h14a1 1 0 001-1v-1"/></svg>Download</button>
            <button class="btn b2" @click="catbox" :disabled="uploading"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.8 10.2a4 4 0 00-5.6 0l-4 4a4 4 0 105.6 5.7l1.1-1.1"/></svg>Share</button>
            <button class="btn bd" @click="del" :disabled="uploading"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 7h12M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m-7 0v12a1 1 0 001 1h6a1 1 0 001-1V7"/></svg>Delete</button>

<script>
const {createApp}=Vue;
const MAR='/apps/marinara/api/bot-browser';   // Marinara backend (same origin, already proxies these sources)
const CHUB='https://api.chub.ai', ELLA='https://ella.janitorai.com/bot-avatars/';
const PH='data:image/svg+xml;utf8,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="#3a4561" stroke-width="1.5"><path d="M4 22h14a2 2 0 0 0 2-2V7.5L14.5 2H6a2 2 0 0 0-2 2v4"/><path d="M14 2v6h6"/></svg>');
const tc=s=>s.replace(/\b([a-z])/g,(m,c)=>c.toUpperCase());
function cleanName(f){let n=(f||'').replace(/\.(png|webp|json|charx|card)$/i,'').replace(/^hub_/i,'').replace(/^(st|marinara|lumiverse)_/i,'').replace(/_/g,' ').replace(/\s+/g,' ').trim();return tc(n)||f;}
// PNG card builder (no server image libs)
const CT=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(b){let c=0xFFFFFFFF;for(let i=0;i<b.length;i++)c=CT[(c^b[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
function b64(s){const b=new TextEncoder().encode(s);let x='';for(let i=0;i<b.length;i++)x+=String.fromCharCode(b[i]);return btoa(x);}
function embed(png,txt){const e=new TextEncoder(),pl=e.encode('chara\0'+txt),ty=e.encode('tEXt'),ch=new Uint8Array(12+pl.length),dv=new DataView(ch.buffer);dv.setUint32(0,pl.length);ch.set(ty,4);ch.set(pl,8);const ci=new Uint8Array(ty.length+pl.length);ci.set(ty,0);ci.set(pl,ty.length);dv.setUint32(8+pl.length,crc32(ci));const o=new Uint8Array(png.length+ch.length);o.set(png.subarray(0,33),0);o.set(ch,33);o.set(png.subarray(33),33+ch.length);return o;}
async function toPng(url,label){
  const draw=()=>{const cv=document.createElement('canvas');cv.width=512;cv.height=768;const x=cv.getContext('2d');const g=x.createLinearGradient(0,0,512,768);g.addColorStop(0,'#7c5cff');g.addColorStop(1,'#f43f5e');x.fillStyle=g;x.fillRect(0,0,512,768);x.fillStyle='rgba(255,255,255,.92)';x.font='bold 40px sans-serif';x.textAlign='center';x.fillText((label||'Character').slice(0,16),256,384);return cv;};
  const cv=await new Promise(res=>{const im=new Image();im.crossOrigin='anonymous';im.onload=()=>{const c=document.createElement('canvas');c.width=im.naturalWidth||512;c.height=im.naturalHeight||768;try{c.getContext('2d').drawImage(im,0,0);res(c);}catch(e){res(draw());}};im.onerror=()=>res(draw());im.src=url||PH;});
  const bl=await new Promise(r=>cv.toBlob(r,'image/png'));if(!bl)throw new Error('canvas');return new Uint8Array(await bl.arrayBuffer());
}
function v2(name,d,tags,creator){return{spec:'chara_card_v2',spec_version:'2.0',data:{name:name||'character',description:d.description||'',personality:d.personality||'',scenario:d.scenario||'',first_mes:d.firstMessage||'',mes_example:d.exampleDialogs||'',creator_notes:d.creatorNotes||'',alternate_greetings:d.alternateGreetings||[],tags:tags||[],creator:creator||''}};}

// ── Provider registry ── all browse via Marinara backend except chub(direct)+datacat(gateway)
const PV={
  chub:{name:'Chub',icon:'✦',color:'rgba(124,92,255,.9)',
    sorts:[{v:'download_count',label:'👑 Most Downloaded'},{v:'last_activity_at',label:'🔄 Recently Updated'},{v:'id',label:'🆕 Newest'},{v:'star_count',label:'⭐ Top Rated'},{v:'random',label:'🎲 Random'}],
    async search(p){
      const u=new URLSearchParams({first:'40',page:String(p.page),nsfw:String(p.nsfw),nsfl:String(p.nsfw),include_forks:'true',venus:'false',min_tokens:'50',search:p.query});
      if(!p.query)u.set('sort',p.sort);
      if(p.inc.length)u.set('topics',p.inc.join(','));
      if(p.exc.length)u.set('excludetopics',p.exc.join(','));
      const j=await(await fetch(CHUB+'/search?'+u,{headers:{Accept:'application/json'}})).json();
      const ns=(j.data&&j.data.nodes)||j.nodes||[];
      return{cards:ns.map(n=>({source:'chub',id:n.fullPath,name:n.name||'Unnamed',creator:n.fullPath?('by '+n.fullPath.split('/')[0]):'',avatarUrl:n.avatar_url,tokens:n.nTokens,stars:n.starCount,tags:n.topics||[],desc:n.description,tagline:n.tagline,dl:n.max_res_url||n.avatar_url,externalUrl:'https://chub.ai/characters/'+n.fullPath})),more:!!(j.data&&j.data.cursor)||ns.length>=40};
    },
    async detail(c){const j=await(await fetch(CHUB+'/api/characters/'+c.id+'?full=true',{headers:{Accept:'application/json'}})).json();const d=(j.node||j.data&&j.data.node||{}).definition||{};return{description:d.description,personality:d.personality,scenario:d.scenario,firstMessage:d.first_message||d.first_mes,exampleDialogs:d.example_dialogs||d.mes_example};},
    async png(c){const r=await fetch(c.dl);if(!r.ok)throw new Error('img');return new Uint8Array(await(await r.blob()).arrayBuffer());}},

  chartavern:{name:'CharTavern',icon:'🍺',color:'rgba(245,158,11,.9)',
    sorts:[{v:'most_popular',label:'🔥 Most Popular'},{v:'trending',label:'📈 Trending'},{v:'newest',label:'🆕 Newest'},{v:'oldest',label:'🕐 Oldest'},{v:'most_likes',label:'❤️ Most Liked'}],
    async search(p){
      const u=new URLSearchParams({q:p.query,page:String(p.page),limit:'60',sort:p.sort,nsfw:String(p.nsfw)});
      if(p.inc.length)u.set('tags',p.inc.join(','));if(p.exc.length)u.set('excludeTags',p.exc.join(','));
      const j=await(await fetch(MAR+'/chartavern/search?'+u)).json();const hs=j.hits||[];
      return{cards:hs.map(h=>({source:'chartavern',id:h.path||'',name:h.name||'Unnamed',creator:h.author?('by '+h.author):'',avatarUrl:h.path?MAR+'/chartavern/avatar/'+h.path:PH,tokens:h.totalTokens,stars:h.likes,tags:h.tags||[],tagline:h.tagline,externalUrl:'https://character-tavern.com/character/'+h.path})),more:hs.length>=60};
    },
    async detail(c){const p=c.id.split('/');if(p.length<2)return{};const j=await(await fetch(MAR+'/chartavern/character/'+p[0]+'/'+p[1])).json();const k=j.card||{};return{description:k.definition_character_description,personality:k.definition_personality,scenario:k.definition_scenario,firstMessage:k.definition_first_message,exampleDialogs:k.definition_example_messages,creatorNotes:k.description};}},

  pygmalion:{name:'Pygmalion',icon:'🔥',color:'rgba(239,68,68,.9)',
    sorts:[{v:'downloads',label:'⬇️ Downloads'},{v:'stars',label:'⭐ Stars'},{v:'views',label:'👁️ Views'},{v:'approved_at',label:'🆕 Newest'},{v:'token_count',label:'📝 Tokens'}],
    async search(p){
      const u=new URLSearchParams({q:p.query,page:String(Math.max(0,p.page-1)),pageSize:'48',orderBy:p.sort,orderDescending:'true'});
      if(p.inc.length)u.set('tagsInclude',p.inc.join(','));if(p.exc.length)u.set('tagsExclude',p.exc.join(','));if(p.nsfw)u.set('includeSensitive','true');
      const j=await(await fetch(MAR+'/pygmalion/search?'+u)).json();const cs=j.characters||[];
      return{cards:cs.map(c=>{const av=c.avatarUrl;const a=av?(av.startsWith('http')?MAR+'/pygmalion/avatar/'+encodeURIComponent(av):MAR+'/pygmalion/avatar/'+av):PH;return{source:'pygmalion',id:c.id||'',name:c.displayName||'Unnamed',creator:(c.owner&&(c.owner.username||c.owner.displayName))?('by '+(c.owner.username||c.owner.displayName)):'',avatarUrl:a,tokens:c.tokenCount,stars:c.stars,tags:c.tags||[],tagline:c.description,externalUrl:'https://pygmalion.chat/character/'+c.id};}),more:cs.length>=48};
    },
    async detail(c){const j=await(await fetch(MAR+'/pygmalion/character?id='+c.id)).json();const p=(j.character||{}).personality||{};return{description:p.persona,firstMessage:p.greeting,exampleDialogs:p.mesExample,creatorNotes:p.characterNotes,alternateGreetings:(p.alternateGreetings||[]).filter(Boolean)};}},

  wyvern:{name:'Wyvern',icon:'🐉',color:'rgba(16,185,129,.9)',
    sorts:[{v:'popular',label:'🔥 Popular'},{v:'nsfw-popular',label:'🔞 Popular NSFW'},{v:'recommended',label:'⭐ Recommended'},{v:'created_at',label:'🆕 New'},{v:'votes',label:'❤️ Most Likes'},{v:'messages',label:'💬 Most Messages'}],
    async search(p){
      const u=new URLSearchParams({page:String(p.page),limit:'48',sort:p.sort});if(p.query)u.set('q',p.query);
      if(p.inc.length)u.set('tags',p.inc.join(','));if(!p.nsfw&&p.sort!=='nsfw-popular')u.set('rating','none');
      const j=await(await fetch(MAR+'/wyvern/search?'+u)).json();let rs=j.results||[];
      if(p.exc.length){const lx=p.exc.map(t=>t.toLowerCase());rs=rs.filter(c=>!(c.tags||[]).map(t=>t.toLowerCase()).some(t=>lx.includes(t)));}
      return{cards:rs.map(c=>{const s=c.statistics_record||c.entity_statistics||{};const src=c.avatar_url||c.avatar;const a=src?(src.startsWith('http')?MAR+'/wyvern/avatar/'+encodeURIComponent(src):MAR+'/wyvern/avatar/'+src+'/public'):PH;return{source:'wyvern',id:c.id||'',name:c.name||'Unnamed',creator:(c.creator&&(c.creator.displayName||c.creator.username))?('by '+(c.creator.displayName||c.creator.username)):'',avatarUrl:a,tokens:0,stars:s.likes||s.total_likes||c.likes||0,tags:c.tags||[],tagline:c.tagline,externalUrl:'https://app.wyvern.chat/characters/'+c.id};}),more:!!j.hasMore||rs.length>=48};
    },
    async detail(c){const k=await(await fetch(MAR+'/wyvern/character/'+c.id)).json();return{description:k.description,personality:k.personality,scenario:k.scenario,firstMessage:k.first_mes,exampleDialogs:k.mes_example,creatorNotes:k.creator_notes,alternateGreetings:(k.alternate_greetings||[]).filter(Boolean)};}},

  datacat:{name:'DataCat',icon:'🐱',color:'rgba(251,146,60,.9)',noTags:true,
    sorts:[{v:'recent',label:'🆕 Recent'},{v:'score',label:'🔥 Popular'}],
    async search(p){
      const u=new URLSearchParams({limit:'40',offset:String((p.page-1)*40),min_tokens:'200'});if(p.query)u.set('q',p.query);if(p.sort&&p.sort!=='recent')u.set('sort',p.sort);
      const j=await(await fetch('/api/storage/datacat/search?'+u,{headers:{Accept:'application/json'}})).json();
      let cs=j.characters||[];
      return{cards:cs.map(c=>{const av=c.avatar||'';return{source:'datacat',id:c.characterId,name:c.name||c.chatName||'Unnamed',creator:c.creatorName?('by '+c.creatorName):'',avatarUrl:av.startsWith('http')?av:(av?ELLA+av:PH),tokens:c.totalTokens||c.total_tokens,stars:null,tags:c.tags||[],desc:c.description||c.rawDescription,externalUrl:'https://janitorai.com/characters/'+c.characterId};}),more:!!j.hasMore};
    },
    async detail(c){return{description:c.desc};},
    async png(c){const j=await(await fetch('/api/storage/datacat/download/'+encodeURIComponent(c.id))).json();const card=(j&&j.data)?{spec:j.spec||'chara_card_v2',spec_version:j.spec_version||'2.0',data:j.data}:j;const base=await toPng((card.data&&card.data.avatar)||c.avatarUrl,c.name);return embed(base,b64(JSON.stringify(card)));}},
};

createApp({
  data(){return{
    loading:true,view:'library',libTab:'characters',q:'',
    data:{characters:[],lorebooks:[]},
    src:'chub',sort:'download_count',nsfw:true,
    showTags:false,tagInput:'',inc:[],exc:[],
    results:[],searching:false,page:1,curQ:'',hasMore:false,
    sel:null,uploading:false,toast:{show:false,msg:'',err:false},_tt:null,
  };},
  computed:{
    providers(){return PV;},
    libItems(){const a=this.data[this.libTab]||[];const s=this.q.toLowerCase().trim();return s?a.filter(i=>(i.display||'').toLowerCase().includes(s)||(i.metaName||'').toLowerCase().includes(s)):a;},
    tagChoices(){const m=new Set([...this.inc,...this.exc]);this.results.forEach(c=>(c.tags||[]).forEach(t=>t&&m.add(String(t))));return [...m].slice(0,60);},
    modalImg(){if(!this.sel)return PH;return this.sel.isOnline?(this.sel.avatarUrl||PH):this.localImg(this.sel);},
  },
  methods:{
    setView(v){this.view=v;if(v==='discover'&&this.results.length===0)this.run(true);},
    onSrc(){this.sort=PV[this.src].sorts[0].v;this.inc=[];this.exc=[];this.run(true);},
    addTag(){const t=this.tagInput.trim();if(t&&!this.inc.includes(t)){this.inc.push(t);}this.tagInput='';},
    cycleTag(t){if(this.inc.includes(t)){this.inc=this.inc.filter(x=>x!==t);this.exc.push(t);}else if(this.exc.includes(t)){this.exc=this.exc.filter(x=>x!==t);}else{this.inc.push(t);}},
    clearTags(){this.inc=[];this.exc=[];},
    async run(reset){
      if(reset){this.page=1;this.curQ=this.q;this.results=[];}
      this.searching=true;const src=this.src;
      try{
        const r=await PV[src].search({query:this.curQ.trim(),page:this.page,sort:this.sort,nsfw:this.nsfw,inc:this.inc,exc:this.exc});
        this.results=reset?r.cards:this.results.concat(r.cards);this.hasMore=!!r.more;
      }catch(e){this.hasMore=false;this.toast2('Could not reach '+PV[src].name+'. Try again.',true);}
      finally{this.searching=false;}
    },
    openOnline(c){this.sel={...c,isOnline:true,isJson:false,metaName:c.name,metaCreator:c.creator};document.body.style.overflow='hidden';this.enrich(c);},
    async enrich(c){try{const d=await PV[c.source].detail(c);if(this.sel&&this.sel.id===c.id)this.sel={...this.sel,...d,_detail:d};}catch(e){}},
    async importOnline(){
      if(!this.sel||this.uploading)return;this.uploading=true;
      try{
        const p=PV[this.sel.source];let png;
        if(p.png){png=await p.png(this.sel);}
        else{const d=this.sel._detail||await p.detail(this.sel);const card=v2(this.sel.name,d||{},this.sel.tags,(this.sel.creator||'').replace(/^by /,''));png=embed(await toPng(this.sel.avatarUrl,this.sel.name),b64(JSON.stringify(card)));}
        await this.up(png,this.sel.name);
        this.toast2('Imported! Appears in your library shortly.');this.close();this.fetchData();
      }catch(e){this.toast2('Import failed — '+(e.message||'error'),true);}
      finally{this.uploading=false;}
    },
    async up(png,name){const safe=(name||'character').replace(/[^a-zA-Z0-9]+/g,'_').replace(/^_+|_+$/g,'')||'character';const fd=new FormData();fd.append('file',new Blob([png],{type:'image/png'}),safe+'.png');const r=await(await fetch('/api/storage/upload',{method:'POST',body:fd})).json();if(!r.success)throw new Error(r.error||'upload');},
    async importFromLink(){
      if(this.uploading)return;const url=(prompt('Paste a JanitorAI / DataCat character link:')||'').trim();if(!url)return;
      const id=(url.match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/)||[])[0];
      if(!id){this.toast2('No character id in that link.',true);return;}
      this.uploading=true;
      try{
        const j=await(await fetch('/api/storage/datacat/download/'+encodeURIComponent(id))).json();
        const card=(j&&j.data)?{spec:j.spec||'chara_card_v2',spec_version:j.spec_version||'2.0',data:j.data}:j;
        const name=(card.data&&card.data.name)||'character';
        const png=embed(await toPng(card.data&&card.data.avatar,name),b64(JSON.stringify(card)));
        await this.up(png,name);this.toast2('Imported "'+name+'"! Appears shortly.');this.fetchData();
      }catch(e){this.toast2('Import failed — may not be on DataCat. ('+(e.message||'')+')',true);}
      finally{this.uploading=false;}
    },
    async fetchData(){
      try{const j=await(await fetch('/api/storage/list')).json();
        for(const t of['characters','lorebooks']){const seen=new Map();(j[t]||[]).forEach(it=>{it.isJson=it.name.toLowerCase().endsWith('.json');if(it.metadata){const s=it.metadata.data||it.metadata;it.metaName=s.name||null;it.metaCreator=s.creator?('by '+s.creator):null;}it.display=(it.metaName&&it.metaName.trim())?it.metaName.trim():cleanName(it.name);const k=it.display.toLowerCase();const pv=seen.get(k);if(!pv)seen.set(k,it);else if(it.name.startsWith('hub_')&&!/_json\.json$/i.test(it.name))seen.set(k,it);});j[t]=[...seen.values()].sort((a,b)=>a.display.localeCompare(b.display));}
        this.data=j;
      }catch(e){this.toast2('Failed to load library.',true);}finally{this.loading=false;}
    },
    async handleUpload(ev){const fs=[...(ev.target.files||[])];if(!fs.length)return;let ok=0;for(const f of fs){try{const fd=new FormData();fd.append('file',f,f.name);const r=await(await fetch('/api/storage/upload',{method:'POST',body:fd})).json();if(r.success)ok++;}catch(e){}}ev.target.value='';this.toast2(ok?('Uploaded '+ok+' file'+(ok>1?'s':'')):'Upload failed.',!ok);if(ok)this.fetchData();},
    localImg(it){return(!it||it.isJson)?PH:'/api/storage/download?path='+encodeURIComponent(it.path);},
    imgErr(e){e.target.src=PH;},
    size(b){return b>1048576?(b/1048576).toFixed(1)+' MB':(b/1024).toFixed(0)+' KB';},
    num(n){n=Number(n)||0;return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(n);},
    openLocal(it){this.sel=it;document.body.style.overflow='hidden';},
    close(){this.sel=null;document.body.style.overflow='';},
    download(){const a=document.createElement('a');a.href='/api/storage/download?path='+encodeURIComponent(this.sel.path);a.download=this.sel.name;document.body.appendChild(a);a.click();a.remove();this.toast2('Downloading '+this.sel.display+'…');},
    async catbox(){if(this.uploading)return;this.uploading=true;try{const d=await(await fetch('/api/storage/catbox?path='+encodeURIComponent(this.sel.path),{method:'POST'})).json();if(d.url){try{await navigator.clipboard.writeText(d.url);}catch(_){}this.toast2('Link copied!');}else this.toast2(d.error||'Failed',true);}catch(e){this.toast2('Upload error',true);}finally{this.uploading=false;}},
    async del(){if(this.uploading||!confirm('Delete "'+this.sel.display+'"?'))return;this.uploading=true;try{const r=await fetch('/api/storage/delete?path='+encodeURIComponent(this.sel.path),{method:'POST'});const d=await r.json().catch(()=>({}));if(r.ok&&d.success!==false){this.toast2('Deleted.');this.close();this.fetchData();}else this.toast2(d.error||'Delete failed',true);}catch(e){this.toast2('Delete failed',true);}finally{this.uploading=false;}},
    renderMd(it){if(!it)return'';let md='';
      if(it.isOnline){if(it.tagline)md+='*'+it.tagline+'*\n\n';const d=it._detail||{};const desc=d.description||it.desc;if(desc)md+='### Description\n'+desc+'\n\n';if(d.personality)md+='### Personality\n'+d.personality+'\n\n';if(d.firstMessage)md+='### First Message\n\n> '+String(d.firstMessage).replace(/\n/g,'\n> ')+'\n';return marked.parse(md||'*Loading details…*');}
      if(!it.metadata)return it.isJson?'<p>No readable content.</p>':'<p>No embedded character data.</p>';
      const s=it.metadata.data||it.metadata;
      if(!it.isJson){if(s.description)md+='### Description\n'+s.description+'\n\n';if(s.personality)md+='### Personality\n'+s.personality+'\n\n';if(s.first_mes)md+='### First Message\n\n> '+String(s.first_mes).replace(/\n/g,'\n> ')+'\n\n';if(s.mes_example)md+='### Example Dialogue\n\n```text\n'+s.mes_example+'\n```\n';}
      else{const raw=s.entries?(Array.isArray(s.entries)?s.entries:Object.values(s.entries)):[];md+='*'+raw.length+' entr'+(raw.length===1?'y':'ies')+'.*\n\n';raw.slice(0,25).forEach(e=>{let k=e.keys||e.key||e.comment||[];if(!Array.isArray(k))k=[k];md+='### '+(k.filter(Boolean).join(', ')||'Entry')+'\n'+(e.content||'')+'\n\n';});if(raw.length>25)md+='*…and '+(raw.length-25)+' more.*';}
      return window.marked?marked.parse(md):md;},
    toast2(m,e=false){this.toast.msg=m;this.toast.err=e;this.toast.show=true;clearTimeout(this._tt);this._tt=setTimeout(()=>this.toast.show=false,4000);},
  },
  mounted(){if(window.marked)marked.setOptions({breaks:true,gfm:true});this.fetchData();window.addEventListener('keydown',e=>{if(e.key==='Escape'&&this.sel)this.close();});},
}).mount('#app');
</script>
