worker_processes 1;
pid /tmp/nginx.pid;
error_log /tmp/nginx-error.log warn;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    client_max_body_size 100m;
    access_log /tmp/nginx-access.log;

    client_body_temp_path /tmp/nginx/body;
    proxy_temp_path       /tmp/nginx/proxy;
    fastcgi_temp_path     /tmp/nginx/fastcgi;
    uwsgi_temp_path       /tmp/nginx/uwsgi;
    scgi_temp_path        /tmp/nginx/scgi;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    include /opt/hub/docker/upstream.conf;

    upstream hub_api {
        server 127.0.0.1:7870;
    }

    server {
        listen 7860;
        server_name _;

        # ── Hub launcher (never proxy to active frontend SPA) ──
        # /api/hub and /hub.html bypass Lumiverse's PWA service worker (its SW
        # hijacks bare /hub and serves cached index.html → React 404).
        location = /api/hub {
            proxy_pass http://hub_api/hub;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache";
        }

        location = /hub.html {
            alias /opt/hub/public/index.html;
            default_type text/html;
            add_header Cache-Control "no-cache";
        }

        # Bare /hub is hijacked by Lumiverse's PWA in many browsers — redirect
        # to /api/hub (SW denylist) when the request reaches nginx.
        location = /hub {
            alias /opt/hub/public/hub-redirect.html;
            default_type text/html;
            add_header Cache-Control "no-cache";
        }

        location = /hub/ {
            return 302 /api/hub;
        }

        location = /api/health {
            proxy_pass http://hub_api/api/health;
        }

        location = /api/active {
            proxy_pass http://hub_api/api/active;
        }

        location = /api/ready {
            proxy_pass http://hub_api/api/ready;
        }

        location ~ ^/api/switch/ {
            proxy_pass http://hub_api;
            proxy_set_header Host $host;
        }

        # ── Active frontend (SillyTavern / Lumiverse / Marinara) ──
        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 60s;
            proxy_read_timeout 3600s;
            proxy_pass http://active_backend;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_connect_timeout 60s;
            proxy_read_timeout 3600s;
            proxy_pass http://active_backend;
        }
    }
}