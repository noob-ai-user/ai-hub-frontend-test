# SillyTavern config tuned for Hugging Face Spaces (reverse proxy + remote access)
dataRoot: ./data
listen: true
listenAddress:
  ipv4: 0.0.0.0
  ipv6: '[::]'
protocol:
  ipv4: true
  ipv6: false
port: 8000
browserLaunch:
  enabled: false
whitelistMode: false
enableForwardedWhitelist: false
whitelist:
  - ::1
  - 127.0.0.1
whitelistDockerHosts: true
basicAuthMode: false
hostWhitelist:
  enabled: false
forwardedHeaders:
  xRealIp: true
  xForwardedFor: true
  cfConnectingIp: true
sessionTimeout: -1
disableCsrfProtection: false
enableUserAccounts: false